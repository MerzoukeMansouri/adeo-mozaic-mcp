version: '3.8'

services:
  mozaic-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: mozaic-mcp-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_TOKEN=${AUTH_TOKEN:-your-secret-token-here}
      - DATABASE_PATH=/app/data/mozaic.db
      - MCP_DEBUG=${MCP_DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://v0.dev,https://*.v0.dev}
    volumes:
      # Persist database between container restarts
      - mozaic-data:/app/data
      # Optional: Mount local database for development
      # - ~/.claude/mozaic.db:/app/data/mozaic.db:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mcp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mozaic-mcp.rule=Host(`mozaic-mcp.local`)"
      - "traefik.http.services.mozaic-mcp.loadbalancer.server.port=3000"
      # Dokploy labels (if using Dokploy)
      - "dokploy.enable=true"
      - "dokploy.name=mozaic-mcp-server"
      - "dokploy.type=nodejs"

  # Optional: Add a reverse proxy for production
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - mozaic-mcp-server
  #   networks:
  #     - mcp-network

volumes:
  mozaic-data:
    driver: local

networks:
  mcp-network:
    driver: bridge